  <style>
/* ── Amplitude Design Tokens ─────────────────────────────────────── */
:root {
  --navy:      #001A4F;
  --blue:      #0052F2;
  --lilac:     #6980FF;
  --teal:      #00B2A9;
  --offwhite:  #F7F9FC;
  --dark:      #1A1A2E;
  --mid:       #64748B;
  --light:     #E2E8F0;
  --surface:   #fff;
  --radius:    10px;
  --shadow:    0 2px 12px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--offwhite);
  color: var(--dark);
  min-height: 100vh;
  font-size: 13px;
}

/* ── Nav ─────────────────────────────────────────────────────────── */
.nav {
  background: var(--navy);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.nav-logo img { height: 20px; width: auto; display: block; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-links a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-links a.active { color: #fff; background: rgba(255,255,255,0.12); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.refresh-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.85);
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.18); }

.last-sync {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

/* ── Page wrapper ────────────────────────────────────────────────── */
.page { padding: 24px; max-width: 1400px; margin: 0 auto; }

.page-header {
  margin-bottom: 20px;
}

.page-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
}

.page-subtitle {
  font-size: 12px;
  color: var(--mid);
  margin-top: 2px;
}

/* ── Card ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--light);
}

.card-header {
  padding: 14px 18px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* ── Badges ──────────────────────────────────────────────────────── */
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  display: inline-block;
}

.badge-expansion { background: #EEF2FF; color: #4338CA; }
.badge-land      { background: #F0FDF4; color: #166534; }
.badge-stage2    { background: #FFF7ED; color: #C2410C; }
.badge-stage3    { background: #ECFDF5; color: #065F46; }
.badge-stage0    { background: #F8FAFC; color: #64748B; }
.badge-lost      { background: #FEF2F2; color: #991B1B; }

/* ── Intent score bar ────────────────────────────────────────────── */
.intent-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}

.intent-track {
  flex: 1;
  height: 5px;
  background: var(--light);
  border-radius: 3px;
  overflow: hidden;
}

.intent-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--blue);
}

.intent-score {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  min-width: 28px;
  text-align: right;
}

/* ── Urgency labels ──────────────────────────────────────────────── */
.urg-today { border-left: 3px solid #EF4444; }
.urg-week  { border-left: 3px solid #F59E0B; }
.urg-month { border-left: 3px solid #6980FF; }

.sl-today { background: #FEE2E2; color: #991B1B; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
.sl-week  { background: #FEF3C7; color: #92400E; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
.sl-month { background: #EEF2FF; color: #4338CA; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.btn-primary {
  background: var(--blue);
  color: #fff;
  font-size: 12px;
  padding: 8px 16px;
}
.btn-primary:hover { background: var(--navy); }

.btn-cowork {
  background: var(--blue);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: background 0.15s;
}
.btn-cowork:hover { background: var(--navy); }
.btn-cowork.success { background: #059669; }

.btn-ghost {
  background: none;
  color: var(--mid);
  font-size: 11px;
  padding: 5px 10px;
  border: 1px solid var(--light);
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

/* ── Filter chips ────────────────────────────────────────────────── */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.chip {
  background: var(--surface);
  border: 1px solid var(--light);
  color: var(--mid);
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--blue); color: var(--blue); }
.chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── Modal ───────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,20,50,0.45);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-box {
  background: #fff;
  border-radius: 14px;
  width: 560px;
  max-width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  overflow: hidden;
}

.modal-head {
  background: var(--navy);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-head-title {
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.modal-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
}

.modal-body { padding: 20px; }

.modal-cowork-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: var(--blue);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 11px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-bottom: 10px;
  transition: background 0.15s;
}
.modal-cowork-btn:hover { background: var(--navy); }
.modal-cowork-btn.success { background: #059669; }

.modal-prompt-hint {
  font-size: 10px;
  color: var(--mid);
  margin-bottom: 8px;
}

.modal-prompt-text {
  background: var(--offwhite);
  border: 1px solid var(--light);
  border-radius: 7px;
  padding: 12px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--dark);
  max-height: 220px;
  overflow-y: auto;
  white-space: pre-wrap;
  margin-bottom: 8px;
}

.modal-copy-btn {
  background: var(--offwhite);
  border: 1px solid var(--light);
  color: var(--mid);
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
}
.modal-copy-btn.copied { background: #D1FAE5; border-color: #6EE7B7; color: #065F46; }

/* ── Misc helpers ────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--mid);
}

.empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--dark); }
.empty-state p  { font-size: 12px; }

.dot-connected { width: 7px; height: 7px; background: #22C55E; border-radius: 50%; display: inline-block; }
.dot-error     { width: 7px; height: 7px; background: #EF4444; border-radius: 50%; display: inline-block; }
.dot-unknown   { width: 7px; height: 7px; background: #94A3B8; border-radius: 50%; display: inline-block; }

function injectNav(activePage) {
  const lastSync = (typeof LAST_REFRESH !== 'undefined' && LAST_REFRESH.timestamp)
    ? new Date(LAST_REFRESH.timestamp).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
    : 'Never synced';

  const pages = [
    { id: 'index',   label: 'My Accounts', icon: '◎', href: 'index.html' },
    { id: 'queue',   label: 'Action Queue', icon: '⚡', href: 'queue.html' },
    { id: 'settings',label: 'Settings',    icon: '⚙', href: 'settings.html' },
  ];

  const links = pages.map(p => {
    const cls = p.id === activePage ? 'active' : '';
    return `<a href="${p.href}" class="${cls}">${p.icon} ${p.label}</a>`;
  }).join('');

  document.getElementById('app-nav').innerHTML = `
    <nav class="nav">
      <div style="display:flex;align-items:center;gap:20px;">
        <a href="index.html" style="display:flex;align-items:center;">
          <img src="${LOGO_SRC}" alt="Amplitude" style="height:20px;width:auto;" />
        </a>
        <div class="nav-links">${links}</div>
      </div>
      <div class="nav-right">
        <span class="last-sync">Last sync: ${lastSync}</span>
        <button class="refresh-btn" onclick="openRefresh()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh Data
        </button>
      </div>
    </nav>
  `;
}

function openRefresh() {

}

// ── Action Modal ──────────────────────────────────────────────────
let _currentSkillLink = 'claude://';
let _currentPrompt = '';

function injectModal() {
  const div = document.createElement('div');
  div.id = 'actionModal';
  div.style.display = 'none';
  div.className = 'modal-overlay';
  div.onclick = (e) => { if (e.target === div) closeModal(); };
  div.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-head-title">
          <span id="modalEmoji">⚡</span>
          <span id="modalTitle">Action</span>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <button class="modal-cowork-btn" id="modalCoworkBtn" onclick="openInCowork()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open in Cowork
        </button>
        <div class="modal-prompt-hint">Prompt auto-copies when you click above — just paste in Cowork</div>
        <div class="modal-prompt-text" id="modalPrompt"></div>
        <button class="modal-copy-btn" id="modalCopyBtn" onclick="copyModalPrompt()">Copy prompt</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
}

function openAction(actionId, acct, title, prompt) {
  _currentSkillLink = SKILL_LINKS[actionId] || 'claude://';
  _currentPrompt = prompt;
  document.getElementById('modalEmoji').textContent = '⚡';
  document.getElementById('modalTitle').textContent = title || actionId;
  document.getElementById('modalPrompt').textContent = prompt;
  document.getElementById('modalCoworkBtn').className = 'modal-cowork-btn';
  document.getElementById('modalCoworkBtn').innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open in Cowork`;
  document.getElementById('modalCopyBtn').textContent = 'Copy prompt';
  document.getElementById('modalCopyBtn').classList.remove('copied');
  document.getElementById('actionModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('actionModal').style.display = 'none';
}

function openInCowork() {
  const btn = document.getElementById('modalCoworkBtn');

  // Fire deep link synchronously — must happen in direct user gesture context,
  // not inside a Promise callback, or browsers block custom protocol navigation.
  const a = document.createElement('a');
  a.href = _currentSkillLink;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Copy prompt async (clipboard API is fine in a Promise)
  navigator.clipboard.writeText(_currentPrompt).catch(() => {});

  // Update button state
  btn.classList.add('success');
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied! Opening Cowork…`;
  setTimeout(() => {
    btn.classList.remove('success');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Open in Cowork`;
  }, 3000);
}

function copyModalPrompt() {
  navigator.clipboard.writeText(_currentPrompt).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 2500);
  });
}

function getFilteredAccounts() {
  return Object.entries(accountData).filter(([name, d]) => {
    if (currentFilter === "all") return true;
    if (currentFilter === "expansion") return d.type === "Expansion";
    if (currentFilter === "new-logo") return d.type === "New Logo";
    if (currentFilter === "s0") return d.stage === "Stage 0";
    if (currentFilter === "s2") return d.stage === "Stage 2";
    if (currentFilter === "s3") return d.stage === "Stage 3";
    if (currentFilter === "lost") return d.stage.includes("Lost");
    if (currentFilter === "high-intent") return d.sixsense.score >= 70;
    return true;
  }).map(([name]) => name);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  rebuildSelect();
}

function rebuildSelect() {
  const filtered = getFilteredAccounts();
  const sel = document.getElementById('accountSelect');
  sel.innerHTML = filtered.map(name => `<option value="${name}">${name}</option>`).join('');
  document.getElementById('acctCount').textContent = `${filtered.length} account${filtered.length !== 1 ? 's' : ''}`;
  const toShow = filtered.includes(currentAccount) ? currentAccount : filtered[0];
  if (toShow) { sel.value = toShow; switchAccount(toShow); }
  else { document.getElementById('linkedinBody').innerHTML = '<p style="color:#94A3B8;font-size:13px;padding:10px 0;">No accounts match this filter.</p>'; document.getElementById('zoominfoBody').innerHTML = ''; document.getElementById('salesforceBody').innerHTML = ''; document.getElementById('sixsenseBody').innerHTML = ''; document.getElementById('mutinyBody').innerHTML = ''; document.getElementById('contextBar').innerHTML = ''; }
}

function renderBuyingMap(acct) {
  const bm = accountData[acct].buyingMap;
  if (!bm) { document.getElementById("linkedinBody").innerHTML = '<p style="color:#94A3B8;font-size:13px;padding:10px 0;">No buying map for this account yet.</p>'; return; }

  // Status helpers
  const statusBar = { engaged: 'st-engaged', target: 'st-target', unknown: 'st-unknown', risk: 'st-risk' };
  const statusLabel = { engaged: ['sl-engaged','Engaged'], target: ['sl-target','Not Connected'], unknown: ['sl-unknown','Unknown'], risk: ['sl-risk','At Risk'] };
  const roleClass = { 'Economic Buyer': 'role-buyer', 'Final Approver': 'role-buyer', 'Budget Holder': 'role-buyer', 'Budget Owner': 'role-buyer', 'Exec Sponsor': 'role-buyer', 'Champion': 'role-champion', 'Champion Candidate': 'role-champion', 'Gatekeeper': 'role-legal', 'Legal Review': 'role-legal', 'Technical Evaluator': 'role-technical', 'Technical Sign-off': 'role-technical', 'Influencer': 'role-influencer', 'Decision Maker': 'role-buyer' };

  // Involve Now banner
  const chips = bm.focus.map(n => `<span class="involve-chip">${n}</span>`).join('');
  let html = `<div class="involve-banner">
    <div class="involve-title">⭐ Involve Now — ${accountData[acct].stage}</div>
    <div class="involve-people">${chips}</div>
    <div class="involve-note">${bm.focusNote}</div>
  </div>`;

  // Coverage summary
  const allPeople = bm.tiers.flatMap(t => t.people);
  const engaged = allPeople.filter(p => p.status === 'engaged').length;
  const targeted = allPeople.filter(p => p.status === 'target').length;
  const unknown = allPeople.filter(p => p.status === 'unknown').length;
  const pips = allPeople.map(p => `<div class="coverage-pip ${p.status === 'engaged' ? 'pip-engaged' : p.status === 'target' ? 'pip-target' : 'pip-unknown'}" title="${p.name} — ${p.status}"></div>`).join('');

  html += `<div class="coverage-bar">
    <span class="coverage-label">Coverage: <strong>${engaged} engaged</strong> · ${targeted} targeted · ${unknown} unknown</span>
    <div class="coverage-pips">${pips}</div>
  </div>`;

  // Tiers
  bm.tiers.forEach(tier => {
    html += `<div class="map-tier"><div class="map-tier-label">${tier.label}</div>`;
    tier.people.forEach(p => {
      const stBar = statusBar[p.status] || 'st-unknown';
      const [slCls, slText] = statusLabel[p.status] || ['sl-unknown', 'Unknown'];
      const roleCls = roleClass[p.role] || 'role-unknown';
      html += `<div class="map-person ${p.priority ? 'priority' : ''}">
        <div class="map-status-bar ${stBar}"></div>
        <div class="map-person-body">
          <div class="map-person-name">
            ${p.name}
            ${p.priority ? '<span class="map-priority-star">⭐</span>' : ''}
          </div>
          <div class="map-person-title">${p.title}</div>
          ${p.note ? `<div class="map-person-note">${p.note}</div>` : ''}
        </div>
        <div class="map-person-right">
          <span class="map-role-badge ${roleCls}">${p.role}</span>
          <span class="map-status-label ${slCls}">${slText}</span>
          <a class="map-li-btn" href="${p.li}" target="_blank">LI</a>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById("linkedinBody").innerHTML = html;
}

function render6sense(acct) {
  const s = accountData[acct].sixsense;

  const scoreColor = s.score >= 80 ? "#EF4444" : s.score >= 65 ? "#F59E0B" : s.score >= 45 ? "#0052F2" : "#94A3B8";
  const stageCls = { Awareness: "stage-awareness", Consideration: "stage-consideration", Decision: "stage-decision", Purchase: "stage-purchase" }[s.stage] || "stage-awareness";
  const personas = s.personas.map(p => `<span class="persona-pill">${p}</span>`).join('');
  const keywords = s.keywords.map(k => `<span class="keyword-chip">${k}</span>`).join('');
  const typeMap = { web: "intent-web", content: "intent-content", search: "intent-search", social: "intent-social" };
  const activities = s.activities.map(a => `
    <div class="intent-item">
      <div class="intent-date">${a.date}</div>
      <span class="intent-type-badge ${typeMap[a.type] || 'intent-web'}">${a.label}</span>
      <div class="intent-text">${a.text}</div>
    </div>`).join('');

  document.getElementById("sixsenseBody").innerHTML = `

      <div style="display:flex;flex-direction:column;align-items:center;border-right:1px solid #F1F5F9;padding-right:20px;">

              <circle class="score-ring-bg" cx="55" cy="55" r="${r}"/>
              <circle class="score-ring-fill" cx="55" cy="55" r="${r}" stroke="${scoreColor}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="score-center">
              <div class="score-number" style="color:${scoreColor};">${s.score}</div>
              <div class="score-label">Intent</div>

          </div>
          <span class="stage-badge ${stageCls}">${s.stage}</span>

// Modal-only actions (not shown in Quick Actions panel, but available for nextStep CTA buttons)
const modalOnlyActions = [
  { id:"write-email", emoji:"✉️", label:"Write Outreach Email", iconCls:"qa-icon-blue", ext:"https://outreach-builder-beta.vercel.app/", extLabel:"Open Outreach Builder", skill:"Use the sales:draft-outreach skill in Cowork for AI-personalized emails." },
];
// flat list for modal lookups — includes hidden modal-only actions
const quickActions = [...quickActionSections.flatMap(s=>s.actions), ...modalOnlyActions];

// ================================================================
// RENDER ACTION HUB
// ================================================================
function renderActionHub(acct) {
  const d = accountData[acct];
  const steps = d.nextSteps || [];
  const urgMap = { today:["sl-today","DO TODAY"], week:["sl-week","THIS WEEK"], month:["sl-month","THIS MONTH"] };
  const typeMap = { email:"stype-email", call:"stype-call", deck:"stype-deck", linkedin:"stype-linkedin", meeting:"stype-meeting", event:"stype-event" };
  const typeLabel = { email:"Email", call:"Call", deck:"Deck", linkedin:"LinkedIn", meeting:"Meeting", event:"Event" };

  // Next steps
  let stepsHtml = `<div class="hub-panel-title">🎯 Prioritized Actions — ${acct}</div>`;
  stepsHtml += steps.map(s => {
    const [urgCls, urgText] = urgMap[s.urgency] || ["sl-month","THIS MONTH"];
    const typeCls = typeMap[s.type] || "stype-email";
    const whoChips = s.who.map(w => `<span class="who-chip ${w==='Susan'?'who-me':''}">${w}</span>`).join('');
    return `<div class="step-item urg-${s.urgency}">
      <div class="step-num">${s.p}</div>
      <div class="step-body">
        <div class="step-meta">
          <span class="step-urgency ${urgCls}">${urgText}</span>
          <span class="step-type-badge ${typeCls}">${typeLabel[s.type]||s.type}</span>
        </div>
        <div class="step-title">${s.title}</div>
        <div class="step-why">${s.why}</div>
        <div class="step-footer">
          <div class="step-who">${whoChips}</div>
          <button class="step-cta" onclick="openAction('${s.action}','${acct.replace(/'/g,"\\'")}','${(s.title||'').replace(/'/g,"\\'")}')">
            ${s.cta} →
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById("hubSteps").innerHTML = stepsHtml;

  // Quick actions — context-filtered by section
  let actHtml = `<div class="hub-panel-title">Quick Actions</div>`;
  quickActionSections.forEach(section => {
    const visible = section.actions.filter(qa => !qa.condition || qa.condition(d));
    if (!visible.length) return;
    actHtml += `<div class="qa-section-label">${section.label}</div>`;
    visible.forEach(qa => {
      if (qa.scroll) {
        actHtml += `<button class="qa-btn" onclick="document.getElementById('${qa.scroll}').scrollIntoView({behavior:'smooth'})"><span class="qa-icon ${qa.iconCls}">${qa.emoji}</span>${qa.label}</button>`;
      } else if (qa.ext) {
        actHtml += `<a class="qa-btn external" href="${qa.ext}" target="_blank"><span class="qa-icon ${qa.iconCls}">${qa.emoji}</span>${qa.label}</a>`;
      } else {
        actHtml += `<button class="qa-btn" onclick="openAction('${qa.id}','${acct.replace(/'/g,"\\'")}','')"><span class="qa-icon ${qa.iconCls}">${qa.emoji}</span>${qa.label}</button>`;
      }
    });
  });
  document.getElementById("hubActions").innerHTML = actHtml;
}

// ================================================================
// MODAL
// ================================================================

    function showError(msg) {
      let el = document.getElementById('_dbgBanner');
      if (!el) {
        el = document.createElement('div');
        el.id = '_dbgBanner';
        el.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:#FEE2E2;color:#991B1B;font-family:monospace;font-size:11px;padding:8px 16px;z-index:9999;border-bottom:1px solid #FCA5A5;white-space:pre-wrap;max-height:120px;overflow-y:auto;';
        document.body.appendChild(el);
      }
      el.textContent += msg + '\n';
    }

    function renderAll(acct) {
      if (!accountData[acct]) {
        showError('renderAll: unknown account "' + acct + '"');
        document.getElementById('detailAccountName').textContent = acct + ' (not found)';
        return;
      }
      document.getElementById('detailAccountName').textContent = acct;
      document.getElementById('accountSelect').value = acct;
      const sections = [renderContextBar, renderLinkedIn, renderBuyingMap, renderZoomInfo, renderSalesforce, render6sense, renderMutiny, renderActionHub];
      sections.forEach(fn => {
        try { fn(acct); }
        catch(e) { showError(fn.name + '(' + acct + '): ' + e.message); console.error(fn.name, e); }
      });
    }

    // Save reference to the modal display function (outer openAction)
    const _showModal = window.openAction;

    // Override global openAction so buttons auto-build prompts
    window.openAction = function(actionId, acct, title) {
      const prompt = buildAccountPrompt(actionId, acct || currentAccount);
      _showModal(actionId, acct || currentAccount, title, prompt);
    };

    // Init
    injectNav('account');
    injectModal();

    rebuildSelect();
    switchAccount(currentAccount);
  </script>

  <!-- Stubs for ported render functions -->
  <span id="syncBtn" style="display:none;"></span>
  <span id="acctCount" style="display:none;"></span>

</body>
